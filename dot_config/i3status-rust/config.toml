[theme]
theme = "native"
[icons]
icons = "material-nf"

[[block]]
block = "focused_window"
[block.format]
full = " $title.str(max_w:80) $visible_marks |"
short = " $title.str(max_w:50) $visible_marks |"

[[block]]
block = "music"
format = "{$combo.str(max_w:25,rot_interval:0.5) { $play|}|}"

[[block]]
block = "custom"
command = "echo "
interval = "once"
[[block.click]]
cmd = "pkill wlsunset || wlsunset -T 4001"
button = "left"

[[block]]
block = "net"
format = " $icon{$signal_strength $ssid $frequency|} $device"
[[block.click]]
button = "left"
cmd = "iwgtk"
[[block.click]]
button = "right"
cmd = "blueman-manager"

[[block]]
block = "keyboard_layout"
driver = "sway"
[block.mappings]
"English (Dvorak)" = "dv"
"English (US)" = "qw"
[[block.click]]
button = "left"
cmd = "swaymsg mode keyboard"
[[block.click]]
button = "right"
cmd = "pkill -SIGRTMIN wvkbd-mobintl || wvkbd-mobintl -fn monospace -L 300"

#[[block]]
#block = "battery"
#format = " $icon $percentage "

[[block]]
block = "time"
interval = 60
format = "$timestamp.datetime(f:'%I:%M %p %a %d-%m-%Y')"

[[block]]
block = "sound"
driver = "pulseaudio"
format = " $icon{ $volume|} "
[[block.click]]
button = "left"
cmd = "pavucontrol-qt"

[[block]]
block = "custom"
command = "echo 󰅜"
interval = "once"
[[block.click]]
cmd = "swaymsg kill"
button = "left"
[[block.click]]
cmd = "sway-ckill.sh"
button = "right"

[[block]]
block = "menu"
text = "󱇙"
[[block.items]]
display = " -&gt; Apps &lt;-"
cmd = "nwggrid"
[[block.items]]
display = " -&gt; ckill &lt;-"
cmd = "sway-ckill.sh"
[[block.items]]
display = " -&gt; Firefox &lt;-"
cmd = "firefox"
[[block.items]]
display = " -&gt; Foot &lt;-"
cmd = "foot"
[[block.items]]
display = " -&gt; Caja &lt;-"
cmd = "caja"

[[block]]
block = "battery"
format = "$icon $percentage"
missing_format = ""

[[block]]
block = "menu"
text = "\uf011"
[[block.items]]
display = " -&gt; Power Off &lt;-"
cmd = "sudo poweroff"
confirm_msg = "Are you sure you want to power off?"
[[block.items]]
display = " -&gt;  Reboot   &lt;-"
cmd = "sudo reboot"
confirm_msg = "Are you sure you want to reboot?"

[[block]]
block = "custom"
command = "cat $XDG_RUNTIME_DIR/screenrecord-file >/dev/null && echo 󰄄"
signal = 4
hide_when_empty = true
interval = "once"

[[block]]
block = "privacy"
[[block.driver]]
name = "v4l"
[[block.driver]]
name = "pipewire"
