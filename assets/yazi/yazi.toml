[[plugin.prepend_fetchers]]
id   = "mime"
name = "*"  # use `url` if you're using the nightly version of Yazi
run  = "mime-ext"
prio = "high"

[mgr]
ratio = [0, 2, 6] 

[preview]
image_delay = 0
max_width  = 10000
max_height = 10000

[opener]
play = [
	{ run = 'umpv "$@"', orphan = true, for = "unix" }
]
